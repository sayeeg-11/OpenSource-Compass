<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <title>OpenSource Compass</title>
  <link rel="icon" href="../library/assets/favicon.png" type="image/png" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" />

  <link
    href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;600;700&family=Crimson+Text:wght@400;600&family=Inter:wght@400;500;600&display=swap"
    rel="stylesheet" />

  <link rel="stylesheet" href="../css/program.css">
  <link rel="stylesheet" href="../css/style.css" />
  <link rel="stylesheet" href="../css/chatbot.css" />
  <link rel="stylesheet" href="../css/footer.css" />
  <link rel="stylesheet" href="../css/pr-generator.css" />
  <link rel="stylesheet" href="/frontend/css/dark-mode.css">
  <link rel='manifest' href='../../manifest.json' />
</head>

<body>
  <div id="cursor-highlight" aria-hidden="true"></div>
  <div id="navbar"></div>

  <main role="main">
    <section id="programs">
      <h3 class="programs-heading">Open Source Programs</h3>
      <p>
        Explore popular open source programs that help students and developers
        gain real-world experience through contributions.
      </p>

      <!-- =========================
          FILTER BAR
      ========================== -->
      <div class="filter-bar">
        <div class="filter-wrapper">
          <select id="levelFilter">
            <option value="all">All Levels</option>
            <option value="beginner">Beginner</option>
            <option value="intermediate">Intermediate</option>
            <option value="advanced">Advanced</option>
          </select>
        </div>

        <div class="filter-wrapper">
          <select id="typeFilter">
            <option value="all">All Types</option>
            <option value="paid">Paid</option>
            <option value="unpaid">Unpaid</option>
          </select>
        </div>

        <div class="filter-wrapper">
          <select id="regionFilter">
            <option value="all">All Regions</option>
            <option value="global">Global</option>
            <option value="india">India</option>
          </select>
        </div>

        <div class="filter-wrapper">
          <select id="statusFilter">
            <option value="all">All Status</option>
            <option value="seasonal">Seasonal</option>
            <option value="ongoing">Ongoing</option>
          </select>
        </div>
      </div>

      <div class="card-grid" id="programs-grid">
        <p id="noResults" style="display:none; text-align:center; width:100%; font-weight:600; color:#555;">
          No programs match the selected filters.
        </p>
        <!-- Program cards will be dynamically loaded here -->
      </div>
    </section>
  </main>

  <div id="footer"></div>

  <script src="../js/components.js"></script>
  <script src="../js/theme.js"></script>
  <script src="../js/contributors.js"></script>
  <script src="../js/chatbot.js"></script>
  <script src="../js/main.js"></script>
  <script src="/frontend/js/DMtheme.js"></script>
  <button id="scrollTopBtn" title="Back to Top">
    <i class="fas fa-chevron-up"></i>
  </button>
  <script src='../js/pwa.js'></script>
  <script src="../js/pr-generator.js"></script>
  <script src="../js/programs-page.js"></script>
</body>

</html>
